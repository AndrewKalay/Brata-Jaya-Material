<!-- ========== JavaScript: populate tables + accessible tab behavior ========== -->
<script>

(function(){
  // Data model - update values here as product data evolves
  const specs = {
    "1.5": {
      "Lebar": "1,22 m",
      "Panjang per roll": "50 m",
      "Warna": "Clear, Grey",
      "Berat": "~3 kg/m"
    },
    "4.0": {
      "Lebar": "1,22 m",
      "Panjang per roll": "20 m",
      "Warna": "Clear, Grey",
      "Berat": "~6 kg/m"
    }
  };

  // Utility to build table rows
  function buildRows(obj) {
    return Object.entries(obj).map(([k,v]) => {
      return `<tr><th scope="row">${escapeHtml(k)}</th><td>${escapeHtml(v)}</td></tr>`;
    }).join('');
  }

  // Escape to avoid injection if values come from external input
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // Inject rows
  document.getElementById('tbody-15').innerHTML = buildRows(specs["1.5"]);
  document.getElementById('tbody-40').innerHTML = buildRows(specs["4.0"]);

  // Tab behaviour (keyboard accessible)
  const tabs = Array.from(document.querySelectorAll('.kf-tab'));
  const panels = Array.from(document.querySelectorAll('.kf-panel'));

  tabs.forEach((tab, idx) => {
    tab.addEventListener('click', () => activateTab(idx));
    tab.addEventListener('keydown', (e) => {
      const key = e.key;
      let newIndex;
      if (key === 'ArrowRight') newIndex = (idx + 1) % tabs.length;
      if (key === 'ArrowLeft') newIndex = (idx - 1 + tabs.length) % tabs.length;
      if (typeof newIndex === 'number') {
        e.preventDefault();
        tabs[newIndex].focus();
        activateTab(newIndex);
      }
      if (key === 'Home') { e.preventDefault(); tabs[0].focus(); activateTab(0); }
      if (key === 'End') { e.preventDefault(); tabs[tabs.length-1].focus(); activateTab(tabs.length-1); }
    });
  });

  function activateTab(activeIndex) {
    tabs.forEach((t, i) => {
      const selected = i === activeIndex;
      t.setAttribute('aria-selected', selected ? 'true' : 'false');
      t.tabIndex = selected ? 0 : -1;
      const panel = panels[i];
      if (panel) {
        if (selected) {
          panel.removeAttribute('hidden');
        } else {
          panel.setAttribute('hidden', '');
        }
      }
    });
  }

  // Initial activation (1.5 mm)
  activateTab(0);

})();
</script>
